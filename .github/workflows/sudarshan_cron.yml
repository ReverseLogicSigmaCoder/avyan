name: SUDARSHAN Autonomous Cloud Engine

on:
  schedule:
    - cron: '0 */6 * * *'  # Har 6 ghante mein autonomous scan
  workflow_dispatch:      # Manual trigger button

jobs:
  sudarshan_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies & Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo service tor start

      - name: Install Python Packages
        run: |
          pip install requests "requests[socks]" beautifulsoup4

      - name: Execute Dark Web Threat Scraper
        run: |
          python sudarshan_soar_engine.py


name: SUDARSHAN Automated Threat Engine

on:
  schedule:
    - cron: '0 */6 * * *'  # Har 6 ghante mein automatic run hoga
  workflow_dispatch:        # Manual trigger button

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run SUDARSHAN Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python otx_threat_feed.py


        run: python sudarshan_full_passive_scan.py
