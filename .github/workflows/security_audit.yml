name: SUDARSHAN Security Auditor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Static Analysis Tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Run Bandit Security Analysis
      run: |
        bandit -r . -x ./venv -ll --exit-zero

