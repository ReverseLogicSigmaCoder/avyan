name: SUDARSHAN Automated Code & Security Auditor

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Static Analysis Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit

    - name: Python Syntax & Code Flaw Check
      run: |
        # Checks for syntax errors and undefined variables
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Security Vulnerability Scan in Code (Bandit)
      run: |
        # Scans python code for hardcoded passwords, unsafe imports, etc.
        bandit -r . -ll
